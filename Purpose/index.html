<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Mohit-au50">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>khatarnak UI</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            letter-spacing: 1px;
        }
        body {
            width: 100%;
            height: 100vh;
            
            display: grid;
            place-items: center;
            background-color: blanchedalmond;
        }
        .main {
            position: relative;
            width: 50%;
            height: 40vh;
        }
        .main p {
            text-align: center;
            font-size: 32px;
            margin-bottom: 24px;
        }

        .main .btn {
            padding: 5px 10px;
            border: none;
            outline: none;
            border-radius: 5px;
            position: absolute;
            color: black;
        }
        #btn1 {
            top: 60%;
            right: 30%;
            background-color: lightgreen;
        }
        #btn1:active {
            transform: scale(0.95);
        }
        #btn2 {
            top: 60%;
            left: 30%;
            background-color: lightcoral;
        }
        
    </style>
</head>
<body>

    <main class="main">
        <p>Do you love me?</p>
        <button class="btn" id="btn1">YES BABY!</button>
        <button class="btn" id="btn2">NO</button>
    </main>

    <script>

        const button1 = document.getElementById("btn1");
        const button2 = document.getElementById("btn2");

        button1.addEventListener('click', () => {
            alert('YAYY THANK U LOVE U');
        });

        let left = 30;

        button2.addEventListener('mouseover', () => {
            if(left == 30) left = 44;
            else left = 30;
            button2.style.left = left + '%';
        });

    </script>
</body>
</html>
